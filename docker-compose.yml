services:

  # ── Qdrant vector database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  # ── FastAPI app ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data                     # golden dataset + results
      - ./results:/app/results               # benchmark CSVs
      - ./bm25_index.pkl:/app/bm25_index.pkl # BM25 index
      - db_data:/app/db                      # shared SQLite DB
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DB_PATH=/app/db/pipeline_monitor.db
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ── Streamlit dashboard ──────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: rag_streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - db_data:/app/db                      # shared SQLite DB
    environment:
      - API_BASE=http://api:8000/api/v1
      - DB_PATH=/app/db/pipeline_monitor.db
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_storage:
  db_data: